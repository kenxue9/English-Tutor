<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI 英语口语练习 - 双语外教</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .main-card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            text-align: center;
            cursor: pointer;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        .chat-area {
            background: #f9fafb;
            border-radius: 28px;
            padding: 20px;
            min-height: 320px;
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 20px;
            position: relative;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.ai {
            align-items: flex-start;
        }

        .bubble {
            max-width: 90%;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
        }

        .user .bubble {
            background: #2b5876;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .ai .bubble {
            background: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 6px;
        }

        .role-label {
            font-size: 0.7rem;
            margin-bottom: 4px;
            margin-left: 8px;
            margin-right: 8px;
            color: #9ca3af;
        }

        /* 录音按钮 */
        .record-btn {
            background: linear-gradient(135deg, #2b5876, #4e4376);
            border: none;
            padding: 18px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            user-select: none;
            -webkit-user-select: none;
        }

        .record-btn.recording {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            transform: scale(0.98);
        }

        .record-btn:active {
            transform: scale(0.97);
        }

        /* 仅语音模式浮层提示 */
        .voice-only-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: white;
            padding: 20px 30px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 500;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out;
        }

        .thinking-dots span:nth-child(1) { animation-delay: 0s; }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 60%, 100% { transform: scale(0.6); opacity: 0.5; }
            30% { transform: scale(1.2); opacity: 1; }
        }

        .status-text {
            text-align: center;
            font-size: 0.85rem;
            color: #6c757d;
            min-height: 36px;
            margin-top: 12px;
        }

        .voice-settings {
            background: #f3f4f6;
            border-radius: 24px;
            padding: 14px 16px;
            margin-top: 16px;
            font-size: 0.8rem;
        }

        .voice-settings label {
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
            margin-top: 10px;
        }

        .voice-settings label:first-of-type {
            margin-top: 0;
        }

        .voice-settings select, 
        .voice-settings input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.8rem;
            background: white;
        }

        .voice-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .voice-row select {
            flex: 2;
        }

        .voice-row button {
            flex: 1;
            background: #6b7280;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 10px 0 5px 0;
            padding: 8px 0;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #2b5876;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        .toggle-label {
            font-weight: 500;
            font-size: 0.85rem;
        }

        .toggle-hint {
            font-size: 0.65rem;
            color: #6c757d;
            margin-top: 4px;
        }

        .api-settings {
            background: #f3f4f6;
            border-radius: 24px;
            padding: 14px 16px;
            margin-top: 12px;
            font-size: 0.8rem;
        }

        .api-settings input {
            width: 100%;
            padding: 8px 12px;
            margin-top: 6px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .api-settings button {
            margin-top: 10px;
            background: #4b5563;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
        }

        .api-status, .voice-status {
            font-size: 0.7rem;
            margin-top: 8px;
            text-align: center;
            color: #059669;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-top: 16px;
        }

        .os-info {
            font-size: 0.7rem;
            color: #6c757d;
            text-align: center;
            margin-top: 8px;
        }

        .debug-info {
            font-size: 0.65rem;
            color: #9ca3af;
            text-align: center;
            margin-top: 6px;
            font-family: monospace;
        }

        /* 录音提示小工具 */
        .record-hint {
            font-size: 0.7rem;
            color: #9ca3af;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-card">
        <h1 id="title" title="双击重置对话">🗣️ AI 双语外教</h1>
        <div class="subtitle">按住说话 · 松手识别</div>

        <div class="chat-area" id="chatArea">
            <div class="message ai">
                <div class="role-label">AI 外教</div>
                <div class="bubble">
                    👋 Hi! I'm your English tutor.<br>
                    📝 我是你的英语外教。按住下方按钮，用英语和我对话吧！
                </div>
            </div>
        </div>

        <button class="record-btn" id="recordBtn">🎤 按住说话</button>
        <div class="record-hint">💡 按住录音，松手自动识别 | 拖出按钮外松手可取消</div>
        <div class="status-text" id="statusText">就绪，按住按钮开始</div>

        <!-- 音色设置 -->
        <div class="voice-settings">
            <div style="font-weight: 600; margin-bottom: 8px;">🎵 语音设置</div>
            <div class="voice-row">
                <select id="voiceSelect">
                    <option value="">加载音色中...</option>
                </select>
                <button id="testVoiceBtn">试听</button>
            </div>
            <label>语速: <span id="rateValue">0.9</span></label>
            <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.05" value="0.9">
            
            <div class="toggle-row">
                <span class="toggle-label">📝 显示回复文字</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="showTextToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="toggle-hint">开启：显示文字气泡 + 语音 / 关闭：仅语音播放 + 浮层提示</div>
            
            <div class="voice-status" id="voiceStatus"></div>
            <div class="os-info" id="osInfo"></div>
            <div class="debug-info" id="debugInfo"></div>
        </div>

        <!-- API 设置 -->
        <div class="api-settings">
            <div style="font-weight: 600; margin-bottom: 8px;">⚙️ API 设置</div>
            <input type="text" id="apiUrl" placeholder="API Base URL" value="https://api.openai.com/v1">
            <input type="text" id="apiKey" placeholder="API Key" type="password">
            <input type="text" id="modelName" placeholder="模型名称" value="gpt-3.5-turbo">
            <div style="font-size: 0.7rem; color: #6c757d; margin-top: 6px;">💡 国内兼容API请填完整 BaseUrl</div>
            <button id="saveApiBtn">保存设置</button>
            <div id="apiSaveMsg" class="api-status"></div>
        </div>
    </div>
    <footer>免费使用 · 智能匹配音色 · 按住说话松手识别</footer>
</div>

<script>
    // DOM 元素
    const recordBtn = document.getElementById('recordBtn');
    const statusText = document.getElementById('statusText');
    const chatArea = document.getElementById('chatArea');
    const apiUrlInput = document.getElementById('apiUrl');
    const apiKeyInput = document.getElementById('apiKey');
    const modelNameInput = document.getElementById('modelName');
    const saveApiBtn = document.getElementById('saveApiBtn');
    const apiSaveMsg = document.getElementById('apiSaveMsg');
    const voiceSelect = document.getElementById('voiceSelect');
    const testVoiceBtn = document.getElementById('testVoiceBtn');
    const rateSlider = document.getElementById('rateSlider');
    const rateValue = document.getElementById('rateValue');
    const voiceStatus = document.getElementById('voiceStatus');
    const osInfo = document.getElementById('osInfo');
    const debugInfo = document.getElementById('debugInfo');
    const showTextToggle = document.getElementById('showTextToggle');

    // 全局状态
    let isRecording = false;
    let isPressing = false;        // 按钮是否被按住
    let pressStartTime = null;     // 按住开始时间戳
    let recognition = null;
    let currentApiConfig = { url: '', key: '', model: '' };
    let availableVoices = [];
    let selectedVoice = null;
    let currentRate = 0.9;
    let currentOS = 'unknown';
    let isWaitingForAI = false;     // 是否正在等待AI回复

    // 对话历史
    let conversationHistory = [
        { 
            role: "system", 
            content: "You are an English teacher. Always respond in BOTH English and Chinese. Format your response as: First the English sentence(s), then on a new line '📝 ' followed by the Chinese translation. Keep English responses short (1-2 sentences) for conversation practice. Be friendly and encouraging. Correct user's grammar gently if needed." 
        }
    ];

    // ========== 声音提示（使用 Web Audio 生成简单提示音）==========
    function playBeep(type) {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'start') {
                // 开始录音：短促高频 "叮"
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                oscillator.type = 'sine';
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
                oscillator.stop(audioContext.currentTime + 0.2);
            } else if (type === 'end') {
                // 识别完成：双短音 "咚咚"
                oscillator.frequency.value = 660;
                gainNode.gain.value = 0.25;
                oscillator.type = 'sine';
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                oscillator.stop(audioContext.currentTime + 0.15);
                
                // 第二声
                setTimeout(() => {
                    const osc2 = audioContext.createOscillator();
                    const gain2 = audioContext.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioContext.destination);
                    osc2.frequency.value = 660;
                    gain2.gain.value = 0.2;
                    osc2.type = 'sine';
                    osc2.start();
                    gain2.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                    osc2.stop(audioContext.currentTime + 0.15);
                }, 100);
            } else if (type === 'cancel') {
                // 取消录音：低沉 "嘟"
                oscillator.frequency.value = 440;
                gainNode.gain.value = 0.2;
                oscillator.type = 'sine';
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                oscillator.stop(audioContext.currentTime + 0.3);
            }
        } catch(e) {
            console.log('音频提示不可用:', e);
        }
    }

    // ========== 仅语音模式浮层 ==========
    let overlayElement = null;

    function showThinkingOverlay() {
        if (shouldShowText()) return; // 文字模式不显示浮层
        
        hideThinkingOverlay();
        overlayElement = document.createElement('div');
        overlayElement.className = 'voice-only-overlay';
        overlayElement.innerHTML = `
            🤖 AI 思考中
            <div class="thinking-dots">
                <span></span><span></span><span></span>
            </div>
        `;
        // 添加到 chatArea 内，相对于 chatArea 定位
        const chatAreaElem = document.getElementById('chatArea');
        chatAreaElem.style.position = 'relative';
        chatAreaElem.appendChild(overlayElement);
    }

    function hideThinkingOverlay() {
        if (overlayElement) {
            overlayElement.remove();
            overlayElement = null;
        }
    }

    // ========== 操作系统检测 ==========
    function detectOS() {
        const userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.indexOf('win') !== -1) {
            currentOS = 'windows';
            osInfo.innerHTML = '🖥️ 检测到 Windows 系统，正在匹配 Microsoft 英语音色...';
            return 'windows';
        }
        if (userAgent.indexOf('mac') !== -1) {
            currentOS = 'mac';
            osInfo.innerHTML = '🍎 检测到 macOS 系统，已自动匹配 Samantha 音色';
            return 'mac';
        }
        if (userAgent.indexOf('chrome') !== -1 && userAgent.indexOf('edg') === -1) {
            currentOS = 'chromeos';
            osInfo.innerHTML = '🌐 检测到 Chrome 系统，已自动匹配 Google 音色';
            return 'chromeos';
        }
        if (userAgent.indexOf('linux') !== -1) {
            currentOS = 'linux';
            osInfo.innerHTML = '🐧 检测到 Linux 系统，已自动匹配首选英语音色';
            return 'linux';
        }
        osInfo.innerHTML = '❓ 未知系统，已自动匹配首选英语音色';
        return 'unknown';
    }

    function getEnglishVoices(voices) {
        return voices.filter(voice => voice.lang.startsWith('en'));
    }

    function selectWindowsVoice(englishVoices) {
        const priorityNames = ['Microsoft David', 'Microsoft Zira', 'Microsoft David Desktop', 'Microsoft Zira Desktop', 'Microsoft Mark', 'Microsoft Susan'];
        for (const targetName of priorityNames) {
            const matched = englishVoices.find(voice => voice.name === targetName);
            if (matched) {
                debugInfo.innerHTML = `✅ 匹配到: ${matched.name} (${matched.lang})`;
                return matched;
            }
        }
        const microsoftVoice = englishVoices.find(voice => voice.name.includes('Microsoft') && voice.lang.startsWith('en'));
        if (microsoftVoice) {
            debugInfo.innerHTML = `✅ 匹配到 Microsoft 音色: ${microsoftVoice.name}`;
            return microsoftVoice;
        }
        debugInfo.innerHTML = `⚠️ 未找到 Microsoft 音色，使用: ${englishVoices[0]?.name || '无'}`;
        return englishVoices[0];
    }

    function selectMacVoice(englishVoices) {
        const targetNames = ['Samantha', 'Alex', 'Karen', 'Daniel'];
        for (const targetName of targetNames) {
            const matched = englishVoices.find(voice => voice.name === targetName);
            if (matched) {
                debugInfo.innerHTML = `✅ 匹配到: ${matched.name}`;
                return matched;
            }
        }
        return englishVoices[0];
    }

    function selectChromeOSVoice(englishVoices) {
        const targetNames = ['Google UK English', 'Google US English'];
        for (const targetName of targetNames) {
            const matched = englishVoices.find(voice => voice.name === targetName);
            if (matched) {
                debugInfo.innerHTML = `✅ 匹配到: ${matched.name}`;
                return matched;
            }
        }
        return englishVoices[0];
    }

    function selectDefaultVoiceByOS(englishVoices) {
        if (!englishVoices || englishVoices.length === 0) {
            debugInfo.innerHTML = '❌ 未找到任何英语音色';
            return null;
        }
        debugInfo.innerHTML = `📋 找到 ${englishVoices.length} 个英语音色: ${englishVoices.map(v => v.name).join(', ')}`;
        switch(currentOS) {
            case 'windows': return selectWindowsVoice(englishVoices);
            case 'mac': return selectMacVoice(englishVoices);
            case 'chromeos': return selectChromeOSVoice(englishVoices);
            default: return englishVoices[0];
        }
    }

    // ========== 语音合成 ==========
    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) {
            setTimeout(loadVoices, 100);
            return;
        }
        availableVoices = voices;
        const englishVoices = getEnglishVoices(voices);
        const nonEnglishVoices = voices.filter(v => !v.lang.startsWith('en'));
        const sortedVoices = [...englishVoices, ...nonEnglishVoices];
        
        voiceSelect.innerHTML = '';
        for (const voice of sortedVoices) {
            const option = document.createElement('option');
            option.value = voice.name;
            const isEnglish = voice.lang.startsWith('en') ? '🇬🇧' : '🌐';
            option.textContent = `${isEnglish} ${voice.name} (${voice.lang})`;
            voiceSelect.appendChild(option);
        }
        
        const defaultVoice = selectDefaultVoiceByOS(englishVoices);
        if (defaultVoice) {
            selectedVoice = defaultVoice;
            voiceSelect.value = defaultVoice.name;
            voiceStatus.innerHTML = `✅ 已自动匹配: ${defaultVoice.name} (${defaultVoice.lang})`;
        } else {
            voiceStatus.innerHTML = '⚠️ 未找到英语音色';
        }
        loadVoiceSettings();
    }

    function onVoiceChange() {
        const selectedName = voiceSelect.value;
        const voice = availableVoices.find(v => v.name === selectedName);
        if (voice) {
            selectedVoice = voice;
            localStorage.setItem('selected_voice', selectedName);
            voiceStatus.innerHTML = `✅ 已选择: ${voice.name}`;
            setTimeout(() => voiceStatus.innerHTML = '', 2000);
        }
    }

    function onRateChange() {
        currentRate = parseFloat(rateSlider.value);
        rateValue.textContent = currentRate.toFixed(2);
        localStorage.setItem('speech_rate', currentRate);
    }

    function extractEnglishText(text) {
        let englishText = text;
        const chineseIndex = text.indexOf('📝');
        if (chineseIndex !== -1) englishText = text.substring(0, chineseIndex);
        englishText = englishText.replace(/[\n\r]/g, ' ').trim();
        return englishText;
    }

    function speakText(text) {
        if (!window.speechSynthesis) return;
        const englishText = extractEnglishText(text);
        if (!englishText) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(englishText);
        utterance.lang = 'en-US';
        utterance.rate = currentRate;
        if (selectedVoice) utterance.voice = selectedVoice;
        window.speechSynthesis.speak(utterance);
    }

    function testVoice() {
        const testText = "Hello! This is how I sound. Let's practice English together.";
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(testText);
        utterance.lang = 'en-US';
        utterance.rate = currentRate;
        if (selectedVoice) utterance.voice = selectedVoice;
        window.speechSynthesis.speak(utterance);
        voiceStatus.innerHTML = '🔊 试听中...';
        setTimeout(() => voiceStatus.innerHTML = '', 2000);
    }

    function loadVoiceSettings() {
        const savedVoice = localStorage.getItem('selected_voice');
        const savedRate = localStorage.getItem('speech_rate');
        if (savedRate) {
            currentRate = parseFloat(savedRate);
            rateSlider.value = currentRate;
            rateValue.textContent = currentRate.toFixed(2);
        }
        if (savedVoice && availableVoices.length > 0) {
            const voice = availableVoices.find(v => v.name === savedVoice);
            if (voice) {
                selectedVoice = voice;
                voiceSelect.value = savedVoice;
            }
        }
    }

    // ========== 文字输出开关 ==========
    function shouldShowText() {
        return showTextToggle.checked;
    }

    function saveTextToggleState() {
        localStorage.setItem('show_text_toggle', showTextToggle.checked);
    }

    function loadTextToggleState() {
        const saved = localStorage.getItem('show_text_toggle');
        if (saved !== null) showTextToggle.checked = saved === 'true';
    }

    // ========== 聊天界面 ==========
    function addMessageToUI(role, text, skipIfVoiceOnly = false) {
        if (skipIfVoiceOnly && !shouldShowText() && role === 'ai') return;
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const label = role === 'user' ? '你' : 'AI 外教';
        const formattedText = text.replace(/\n/g, '<br>');
        messageDiv.innerHTML = `<div class="role-label">${label}</div><div class="bubble">${formattedText}</div>`;
        chatArea.appendChild(messageDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ========== LLM API ==========
    async function callAI(userText) {
        const config = currentApiConfig;
        if (!config.url || !config.key || !config.model) {
            throw new Error('请先保存 API 设置');
        }
        conversationHistory.push({ role: "user", content: userText });
        let fullUrl = config.url.replace(/\/$/, '') + '/chat/completions';
        const response = await fetch(fullUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
            body: JSON.stringify({ model: config.model, messages: conversationHistory, temperature: 0.7, max_tokens: 500 })
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API ${response.status}: ${errText}`);
        }
        const data = await response.json();
        const assistantMessage = data.choices[0].message.content;
        conversationHistory.push({ role: "assistant", content: assistantMessage });
        if (conversationHistory.length > 11) {
            conversationHistory = [conversationHistory[0], ...conversationHistory.slice(-10)];
        }
        return assistantMessage;
    }

    // ========== 语音识别（按住录音核心）==========
    function initSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            statusText.innerText = '❌ 浏览器不支持语音识别';
            recordBtn.disabled = true;
            return null;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recog = new SpeechRecognition();
        recog.continuous = false;
        recog.interimResults = false;
        recog.lang = 'en-US';
        return recog;
    }

    // 开始录音（按住时调用）
    function startRecording() {
        if (isRecording || isWaitingForAI) {
            statusText.innerText = isWaitingForAI ? '请等待 AI 回复完成...' : '录音中，请勿重复点击';
            return;
        }
        
        if (!recognition) {
            recognition = initSpeechRecognition();
            if (!recognition) return;
            bindRecognitionEvents();
        }
        
        try {
            recognition.start();
            isRecording = true;
            pressStartTime = Date.now();
            recordBtn.classList.add('recording');
            recordBtn.innerHTML = '🔴 录音中... 松手停止';
            statusText.innerText = '🎙️ 录音中，请说英语...';
            playBeep('start');
        } catch (err) {
            console.error('start error', err);
            statusText.innerText = '无法启动麦克风，请检查权限';
            isRecording = false;
            isPressing = false;
        }
    }

    // 停止录音（松开时调用）
    function stopRecordingAndRecognize(cancel = false) {
        if (!isRecording) return;
        
        const pressDuration = Date.now() - pressStartTime;
        
        // 如果录音时间过短（< 0.5秒）或取消
        if (cancel || pressDuration < 500) {
            try { recognition.stop(); } catch(e) {}
            isRecording = false;
            isPressing = false;
            recordBtn.classList.remove('recording');
            recordBtn.innerHTML = '🎤 按住说话';
            if (pressDuration < 500 && !cancel) {
                statusText.innerText = '⏱️ 说话时间太短，请按住多说一会儿';
                playBeep('cancel');
                setTimeout(() => {
                    if (statusText.innerText === '⏱️ 说话时间太短，请按住多说一会儿') {
                        statusText.innerText = '就绪，按住按钮开始';
                    }
                }, 1500);
            } else if (cancel) {
                statusText.innerText = '已取消录音';
                playBeep('cancel');
                setTimeout(() => {
                    if (statusText.innerText === '已取消录音') statusText.innerText = '就绪，按住按钮开始';
                }, 1000);
            }
            return;
        }
        
        // 正常停止，触发识别
        try { recognition.stop(); } catch(e) {}
        // onresult 会在 stop 后触发
    }

    function bindRecognitionEvents() {
        recognition.onstart = () => {
            console.log('recognition started');
        };
        
        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            statusText.innerText = `✅ 识别: "${transcript}"`;
            playBeep('end');
            
            // 显示用户消息
            addMessageToUI('user', transcript, false);
            
            // 调用 AI
            statusText.innerText = '🤖 AI 思考中...';
            
            // 仅语音模式显示浮层
            if (!shouldShowText()) {
                showThinkingOverlay();
            }
            
            isWaitingForAI = true;
            
            try {
                const reply = await callAI(transcript);
                hideThinkingOverlay();
                statusText.innerText = '🔊 播放中...';
                speakText(reply);
                addMessageToUI('ai', reply, true);  // 第二个参数 true 表示如果是仅语音模式则跳过
                setTimeout(() => {
                    if (statusText.innerText === '🔊 播放中...') {
                        statusText.innerText = '就绪，按住按钮开始';
                    }
                }, 1500);
            } catch (err) {
                hideThinkingOverlay();
                statusText.innerText = `错误: ${err.message}`;
                addMessageToUI('ai', `⚠️ ${err.message}\n📝 请检查 API 设置`, false);
            } finally {
                isWaitingForAI = false;
            }
        };
        
        recognition.onerror = (event) => {
            console.error('recognition error', event.error);
            hideThinkingOverlay();
            let msg = '';
            if (event.error === 'not-allowed') msg = '麦克风权限被拒绝';
            else if (event.error === 'no-speech') msg = '未检测到语音，请重试';
            else msg = `错误: ${event.error}`;
            statusText.innerText = msg;
            playBeep('cancel');
            setTimeout(() => {
                if (statusText.innerText === msg) statusText.innerText = '就绪，按住按钮开始';
            }, 1500);
            isRecording = false;
            isPressing = false;
            recordBtn.classList.remove('recording');
            recordBtn.innerHTML = '🎤 按住说话';
        };
        
        recognition.onend = () => {
            isRecording = false;
            isPressing = false;
            recordBtn.classList.remove('recording');
            if (!isWaitingForAI) {
                recordBtn.innerHTML = '🎤 按住说话';
            }
        };
    }

    // ========== 按钮事件：按住/松开/拖出取消 ==========
    function onPointerDown(e) {
        e.preventDefault();
        if (isWaitingForAI) {
            statusText.innerText = '请等待 AI 回复完成...';
            return;
        }
        isPressing = true;
        startRecording();
        
        // 监听全局松开
        window.addEventListener('pointerup', onPointerUp);
        window.addEventListener('pointercancel', onPointerCancel);
    }
    
    function onPointerUp(e) {
        window.removeEventListener('pointerup', onPointerUp);
        window.removeEventListener('pointercancel', onPointerCancel);
        
        if (!isPressing) return;
        isPressing = false;
        
        // 检查是否在按钮范围内松开（拖出取消）
        const rect = recordBtn.getBoundingClientRect();
        const isInside = (e.clientX >= rect.left && e.clientX <= rect.right &&
                          e.clientY >= rect.top && e.clientY <= rect.bottom);
        
        if (isInside) {
            stopRecordingAndRecognize(false);
        } else {
            stopRecordingAndRecognize(true); // 拖出取消
        }
    }
    
    function onPointerCancel(e) {
        window.removeEventListener('pointerup', onPointerUp);
        window.removeEventListener('pointercancel', onPointerCancel);
        if (isPressing) {
            stopRecordingAndRecognize(true);
        }
        isPressing = false;
    }

    // ========== API 配置 ==========
    function loadApiConfig() {
        const saved = localStorage.getItem('ai_tutor_api');
        if (saved) {
            try {
                const cfg = JSON.parse(saved);
                currentApiConfig = cfg;
                apiUrlInput.value = cfg.url || '';
                apiKeyInput.value = cfg.key || '';
                modelNameInput.value = cfg.model || '';
            } catch(e) {}
        }
    }

    function saveApiConfig() {
        const url = apiUrlInput.value.trim();
        const key = apiKeyInput.value.trim();
        const model = modelNameInput.value.trim();
        if (!url || !key || !model) {
            apiSaveMsg.innerText = '请填写完整';
            apiSaveMsg.style.color = '#dc2626';
            setTimeout(() => apiSaveMsg.innerText = '', 2000);
            return;
        }
        currentApiConfig = { url, key, model };
        localStorage.setItem('ai_tutor_api', JSON.stringify(currentApiConfig));
        apiSaveMsg.innerText = '✅ 已保存';
        apiSaveMsg.style.color = '#059669';
        setTimeout(() => apiSaveMsg.innerText = '', 2000);
        conversationHistory = [{ role: "system", content: "You are an English teacher. Always respond in BOTH English and Chinese. Format: English first, then '📝 ' + Chinese translation. Keep English short (1-2 sentences)." }];
    }

    function resetConversation() {
        conversationHistory = [{ role: "system", content: "You are an English teacher. Always respond in BOTH English and Chinese. Format: English first, then '📝 ' + Chinese translation. Keep English short (1-2 sentences)." }];
        chatArea.innerHTML = '';
        addMessageToUI('ai', "👋 Hi! I'm your English tutor.\n📝 我是你的英语外教。按住下方按钮开始对话！", false);
        statusText.innerText = '对话已重置';
        setTimeout(() => { if (statusText.innerText === '对话已重置') statusText.innerText = '就绪，按住按钮开始'; }, 1500);
    }

    // ========== 初始化 ==========
    function init() {
        detectOS();
        loadApiConfig();
        loadTextToggleState();
        
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => loadVoices();
            setTimeout(() => { if (availableVoices.length === 0) loadVoices(); }, 100);
        }
        
        showTextToggle.addEventListener('change', () => {
            saveTextToggleState();
            const isTextVisible = shouldShowText();
            voiceStatus.innerHTML = isTextVisible ? '📝 文字已显示' : '🔇 仅语音模式';
            setTimeout(() => voiceStatus.innerHTML = '', 1500);
        });
        
        voiceSelect.addEventListener('change', onVoiceChange);
        testVoiceBtn.addEventListener('click', testVoice);
        rateSlider.addEventListener('input', onRateChange);
        
        // 按住录音事件
        recordBtn.addEventListener('pointerdown', onPointerDown);
        
        saveApiBtn.addEventListener('click', saveApiConfig);
        document.getElementById('title').addEventListener('dblclick', resetConversation);
    }
    
    init();
</script>
